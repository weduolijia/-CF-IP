name: Update APAC Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "18 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate feed
        run: python fetch_apac.py

      - name: Commit updated feed
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update APAC proxy feed"
          file_pattern: all.txt raw.all top10.txt top10.json

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changes_detected == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/weduolijia/-CF-IP@main/raw.all"
          curl -fsS "https://purge.jsdelivr.net/gh/weduolijia/-CF-IP@main/all.txt"
          curl -fsS "https://purge.jsdelivr.net/gh/weduolijia/-CF-IP@main/top10.txt"
          curl -fsS "https://purge.jsdelivr.net/gh/weduolijia/-CF-IP@main/top10.json"
